name: Reusable - Update GitOps Repository

on:
  workflow_call:
    inputs:
      IMAGE_TAG:
        required: true
        type: string
        description: "Image tag to deploy (from build-push output)"
      REGISTRY_URL:
        required: true
        type: string
        description: "Container registry URL (e.g., myregistry.azurecr.io)"
      TYPE:
        required: false
        type: string
        default: ""
        description: "Optional service variant suffix (e.g. api, worker). Must match the TYPE used in build-push."
      ENVIRONMENT:
        required: false
        type: string
        default: ""
        description: "Target environment (dev, stage, prod). When omitted, path is flat: {VALUES_PATH_PREFIX}/{repo}.yaml"
      VALUES_PATH_PREFIX:
        required: false
        type: string
        default: "aks-baip"
        description: "Root folder inside the GitOps repo containing values files (e.g., aks-baip)"
      GITOPS_REPO:
        required: false
        type: string
        default: "BaiP-AI-Private/baip-argocd-helm"
        description: "GitOps repository (org/repo)"
      GITOPS_BRANCH:
        required: false
        type: string
        default: "main"
        description: "GitOps repository branch"
      AUTH_METHOD:
        required: false
        type: string
        default: "pat"
        description: "Auth method for GitOps repo access: 'pat' (GitHub PAT) or 'deploy_key' (SSH key from Azure Key Vault via OIDC)"
      AZURE_KEYVAULT_NAME:
        required: false
        type: string
        default: "baip-kv"
        description: "Azure Key Vault name (used when AUTH_METHOD=deploy_key)"
      AZURE_KEYVAULT_SECRET_NAME:
        required: false
        type: string
        default: "baip-argocd-helm-deploy-key"
        description: "Key Vault secret name containing the SSH deploy key (used when AUTH_METHOD=deploy_key)"

    secrets:
      GITHUB_PAT:
        required: false         # required when AUTH_METHOD=pat
      AZURE_CLIENT_ID:
        required: false         # required when AUTH_METHOD=deploy_key
      AZURE_TENANT_ID:
        required: false         # required when AUTH_METHOD=deploy_key
      AZURE_SUBSCRIPTION_ID:
        required: false         # required when AUTH_METHOD=deploy_key

jobs:
  update-gitops:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC Azure login (deploy_key mode)
      issues: write    # required to create deployment tracking issue

    steps:
      - name: Azure Login
        if: inputs.AUTH_METHOD == 'deploy_key'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Deploy Key from Key Vault
        if: inputs.AUTH_METHOD == 'deploy_key'
        run: |
          # Explicitly request a token scoped to Key Vault data plane to avoid
          # AKV10046 (JWT validation failure) caused by the CLI reusing a
          # management-plane token for the vault.azure.net audience.
          KV_TOKEN=$(az account get-access-token \
            --resource https://vault.azure.net \
            --query accessToken -o tsv)
          KEY=$(curl -sf \
            -H "Authorization: Bearer ${KV_TOKEN}" \
            "https://${{ inputs.AZURE_KEYVAULT_NAME }}.vault.azure.net/secrets/${{ inputs.AZURE_KEYVAULT_SECRET_NAME }}?api-version=7.4" \
            | jq -r '.value')
          echo "GITOPS_DEPLOY_KEY<<EOF" >> $GITHUB_ENV
          echo "$KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Checkout GitOps Repository
        if: inputs.AUTH_METHOD != 'deploy_key'
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.GITOPS_REPO }}
          token: ${{ secrets.GITHUB_PAT }}
          ref: ${{ inputs.GITOPS_BRANCH }}

      - name: Checkout GitOps Repository
        if: inputs.AUTH_METHOD == 'deploy_key'
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.GITOPS_REPO }}
          ssh-key: ${{ env.GITOPS_DEPLOY_KEY }}
          ref: ${{ inputs.GITOPS_BRANCH }}

      - name: Setup Git Config
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions-bot@users.noreply.github.com"

      - name: Determine File Path
        id: determine-config
        run: |
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          ENVIRONMENT="${{ inputs.ENVIRONMENT }}"
          IMAGE_TAG="${{ inputs.IMAGE_TAG }}"
          VALUES_PATH_PREFIX="${{ inputs.VALUES_PATH_PREFIX }}"
          TYPE="${{ inputs.TYPE }}"

          if [ -n "$TYPE" ]; then
            SERVICE_NAME="${REPO_NAME}-${TYPE}"
          else
            SERVICE_NAME="${REPO_NAME}"
          fi

          if [ -n "$ENVIRONMENT" ]; then
            VALUES_FILE="${VALUES_PATH_PREFIX}/${ENVIRONMENT}/${SERVICE_NAME}.yaml"
          else
            VALUES_FILE="${VALUES_PATH_PREFIX}/${SERVICE_NAME}.yaml"
          fi

          echo "values_file=${VALUES_FILE}" >> $GITHUB_OUTPUT
          echo "final_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "service_name=${SERVICE_NAME}" >> $GITHUB_OUTPUT

          echo "### GitOps Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** \`${SERVICE_NAME}\`" >> $GITHUB_STEP_SUMMARY
          if [ -n "$ENVIRONMENT" ]; then
            echo "- **Environment:** \`${ENVIRONMENT}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Environment:** *(single-env, flat path)*" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Image Tag:** \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Values File:** \`${VALUES_FILE}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Auth Method:** \`${{ inputs.AUTH_METHOD }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Update Helm Values
        id: update-values
        run: |
          VALUES_FILE="${{ steps.determine-config.outputs.values_file }}"
          SERVICE_NAME="${{ steps.determine-config.outputs.service_name }}"
          IMAGE_TAG="${{ steps.determine-config.outputs.final_tag }}"

          if [ ! -f "$VALUES_FILE" ]; then
            echo "Values file not found: $VALUES_FILE"
            exit 1
          fi

          cp "$VALUES_FILE" "${VALUES_FILE}.backup"

          IMAGE_REPO="${{ inputs.REGISTRY_URL }}/${SERVICE_NAME}"
          yq eval ".image.repository = \"${IMAGE_REPO}\"" -i "$VALUES_FILE"
          yq eval ".image.tag = \"${IMAGE_TAG}\"" -i "$VALUES_FILE"

          if diff "$VALUES_FILE" "${VALUES_FILE}.backup" > /dev/null; then
            echo "No changes detected in values file"
            echo "modified=false" >> $GITHUB_OUTPUT
          else
            echo "Values file updated successfully"
            echo "modified=true" >> $GITHUB_OUTPUT

            echo "### Changes Made" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            diff "${VALUES_FILE}.backup" "$VALUES_FILE" >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          rm "${VALUES_FILE}.backup"

      - name: Commit and Push Changes
        if: steps.update-values.outputs.modified == 'true'
        run: |
          VALUES_FILE="${{ steps.determine-config.outputs.values_file }}"
          git add "$VALUES_FILE"

          cat << EOF > commit_msg.txt
          Update ${{ steps.determine-config.outputs.service_name }} image for ${{ inputs.ENVIRONMENT }}

          - Service: ${{ steps.determine-config.outputs.service_name }}
          - Environment: ${{ inputs.ENVIRONMENT }}
          - Image Tag: ${{ steps.determine-config.outputs.final_tag }}
          - Triggered by: ${{ github.repository }}@${{ github.sha }}
          - Workflow: ${{ github.workflow }}
          EOF

          git commit -F commit_msg.txt

          MAX_RETRIES=5
          RETRY_COUNT=0
          BASE_DELAY=3

          echo "### Push Strategy" >> $GITHUB_STEP_SUMMARY
          echo "Attempting to push with automatic retry on conflicts..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((RETRY_COUNT + 1))
            echo "Attempt $ATTEMPT of $MAX_RETRIES: Pushing changes..."

            if git push origin ${{ inputs.GITOPS_BRANCH }}; then
              echo "Successfully pushed changes on attempt $ATTEMPT" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              break
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))

              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Push failed (likely due to concurrent update)"
                echo "Attempt $ATTEMPT failed - concurrent update detected" >> $GITHUB_STEP_SUMMARY

                # Wait first to let concurrent pushes settle
                WAIT_TIME=$((BASE_DELAY * RETRY_COUNT + RANDOM % 3))
                echo "Waiting ${WAIT_TIME} seconds before retry $((RETRY_COUNT + 1))..."
                sleep $WAIT_TIME

                # Then pull latest changes and rebase right before pushing
                echo "Pulling latest changes and rebasing..."
                if git pull --rebase origin ${{ inputs.GITOPS_BRANCH }}; then
                  echo "Rebase successful, will retry push"
                else
                  if git diff --name-only --diff-filter=U | grep -q "$VALUES_FILE"; then
                    echo "CONFLICT: Our values file has conflicts!" | tee -a $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "**Conflicting files:**" >> $GITHUB_STEP_SUMMARY
                    git diff --name-only --diff-filter=U >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "This should not happen — each service owns its own file." >> $GITHUB_STEP_SUMMARY
                    exit 1
                  else
                    echo "Conflicts in other services files (expected), continuing..."
                    git add -A
                    git rebase --continue || echo "Rebase completed with resolution"
                  fi
                fi
              else
                echo "Failed to push after $MAX_RETRIES attempts" | tee -a $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "**Possible causes:**" >> $GITHUB_STEP_SUMMARY
                echo "- High concurrent deployment activity" >> $GITHUB_STEP_SUMMARY
                echo "- Network issues" >> $GITHUB_STEP_SUMMARY
                echo "- GitOps repository protected branch rules" >> $GITHUB_STEP_SUMMARY
                exit 1
              fi
            fi
          done

          echo "### GitOps Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **File Updated:** \`${{ steps.determine-config.outputs.values_file }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **New Image Tag:** \`${{ steps.determine-config.outputs.final_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Push Attempts:** $ATTEMPT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ArgoCD will sync this change automatically**" >> $GITHUB_STEP_SUMMARY

      - name: Create Deployment Tracking Issue
        if: steps.update-values.outputs.modified == 'true' && inputs.ENVIRONMENT == 'prod'
        uses: actions/github-script@v7
        with:
          github-token: ${{ inputs.AUTH_METHOD == 'deploy_key' && github.token || secrets.GITHUB_PAT }}
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Deployment] ${{ steps.determine-config.outputs.service_name }} to ${{ inputs.ENVIRONMENT }}`,
              body: `## Deployment Information

              - **Service:** ${{ steps.determine-config.outputs.service_name }}
              - **Environment:** ${{ inputs.ENVIRONMENT }}
              - **Image Tag:** ${{ steps.determine-config.outputs.final_tag }}
              - **Commit:** ${{ github.sha }}
              - **Triggered by:** @${{ github.actor }}

              ArgoCD will automatically sync this deployment.

              [View GitOps Commit](https://github.com/${{ inputs.GITOPS_REPO }}/commits/${{ inputs.GITOPS_BRANCH }})`,
              labels: ['deployment', '${{ inputs.ENVIRONMENT }}']
            });
            console.log(`Created issue #${issue.data.number}`);
